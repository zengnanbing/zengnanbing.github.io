<p>基础导入</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line">library(rJava)</div><div class="line">library(Rwordseg) </div><div class="line">library(RColorBrewer)</div><div class="line">library(wordcloud)</div></pre></td></tr></table></figure>
<p>读入数据</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">lecture&lt;-read.csv(&quot;E:/users/zeng/R/hongloumeng.txt&quot;, stringsAsFactors=FALSE,header=FALSE)</div></pre></td></tr></table></figure>
<p>优化词库</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div></pre></td><td class="code"><pre><div class="line">installDict(&quot;E:\\users\\zeng\\ciku\\红楼梦词汇大全.scel&quot;,&quot;hongloumeng1&quot;)</div><div class="line">installDict(&quot;E:\\users\\zeng\\ciku\\红楼梦群成员名字词库.scel&quot;,&quot;hongloumeng2&quot;)</div><div class="line">installDict(&quot;E:\\users\\zeng\\ciku\\红楼梦词汇.scel&quot;,&quot;hongloumeng3&quot;)</div></pre></td></tr></table></figure>
<p>分词+统计词频</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div></pre></td><td class="code"><pre><div class="line">words=unlist(lapply(X=lecture, FUN=segmentCN))</div><div class="line">#unlist将list类型的数据，转化为vector</div><div class="line">#lapply()返回一个长度与X一致的列表，每个元素为FUN计算出的结果，且分别对应到X中的每个元素。</div><div class="line">word=lapply(X=words, FUN=strsplit, &quot; &quot;) </div><div class="line">v=table(unlist(word))</div><div class="line">#table统计数据的频数</div></pre></td></tr></table></figure>
<p>完整代码</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div></pre></td><td class="code"><pre><div class="line">library(rJava)</div><div class="line">library(Rwordseg) </div><div class="line">library(RColorBrewer)</div><div class="line">library(wordcloud)</div><div class="line">#读入数据  </div><div class="line">lecture&lt;-read.csv(&quot;E:/users/zeng/R/hongloumeng.txt&quot;, stringsAsFactors=FALSE,header=FALSE)</div><div class="line">#文本预处理  </div><div class="line">res=lecture[]</div><div class="line">#分词+频数统计  </div><div class="line">installDict(&quot;E:\\users\\zeng\\ciku\\红楼梦词汇大全.scel&quot;,&quot;hongloumeng1&quot;)</div><div class="line">installDict(&quot;E:\\users\\zeng\\ciku\\红楼梦群成员名字词库.scel&quot;,&quot;hongloumeng2&quot;)</div><div class="line">installDict(&quot;E:\\users\\zeng\\ciku\\红楼梦词汇.scel&quot;,&quot;hongloumeng3&quot;)</div><div class="line">words=unlist(lapply(X=res, FUN=segmentCN))</div><div class="line"></div><div class="line">#unlist将list类型的数据，转化为vector</div><div class="line">#lapply()返回一个长度与X一致的列表，每个元素为FUN计算出的结果，且分别对应到X中的每个元素。</div><div class="line">word=lapply(X=words, FUN=strsplit, &quot; &quot;) </div><div class="line">v=table(unlist(word))</div><div class="line">#table统计数据的频数</div><div class="line"># 降序排序  </div><div class="line">v=rev(sort(v))</div><div class="line"></div><div class="line">d=data.frame(词汇=names(v), 词频=v)  #创建数据框</div><div class="line">#过滤掉1个字和词频小于200的记录  </div><div class="line">d=subset(d, nchar(as.character(d$词汇))&gt;1 &amp; d$词频&gt;=100)  </div><div class="line">  </div><div class="line">#输出结果</div><div class="line">write.csv(d, file=&quot;E:/users/zeng/hongloumongresult.csv&quot;, row.names=FALSE)   </div><div class="line"></div><div class="line">#画出标签云</div><div class="line">mydata&lt;-read.csv(&quot;E:/users/zeng/hongloumengresult.csv&quot;,head=TRUE)</div><div class="line">mycolors &lt;- brewer.pal(12,&quot;Paired&quot;)</div><div class="line">windowsFonts(myFont=windowsFont(&quot;锐字巅峰粗黑简1.0&quot;)) </div><div class="line">wordcloud(mydata$词汇,mydata$词频,random.order=FALSE,random.color=TRUE,colors=mycolors,family=&quot;myFont&quot;)</div></pre></td></tr></table></figure>
<p>在黑板上写下50个数字：1至50.在接下来的49轮操作中，每次做如下动作：选取两个黑板上的数字a和b，擦去，在黑板上写|b – a|。请问最后一次动作之后剩下数字可能是什么？为什么？</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div></pre></td><td class="code"><pre><div class="line">w=rep(0,7000)</div><div class="line">for(j in 1:7000)&#123;</div><div class="line">  t=c(1:50)</div><div class="line">  for(i in 1:49)&#123;</div><div class="line">    q=sample(t,2)</div><div class="line">    a=q[1];b=q[2];c=abs(a-b)</div><div class="line">    t=t[-which(t==a)]</div><div class="line">    len1=length(t)-50+i</div><div class="line">    if(len1&lt;0) t=c(t,rep(b,abs(len1)))</div><div class="line">    t=t[-which(t==b)]</div><div class="line">    len2=length(t)-49+i</div><div class="line">    if(len2&lt;0) t=c(t,rep(b,abs(len2)))</div><div class="line">    t[length(t)+1]=c</div><div class="line">    if(length(t)==1) w[j]=t</div><div class="line">  &#125;</div><div class="line">&#125;</div><div class="line">summary(w)</div></pre></td></tr></table></figure>
